<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Openings | DREAMRS Lab</title>
    <meta name="description" content="Join DREAMRS Lab - Current openings for research projects">
    <link rel="icon" href="images/logo.png" type="image/png">
    <link href="./custom.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

    <section id="Openings" class="py-8 pt-36 px-6 bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col">
        <div class="container mx-auto max-w-6xl flex-1 flex flex-col justify-center">
            <!-- Section Header -->
            <div class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-800 dark:text-white">
                    <span class="gradient-text">Current</span> Openings
                </h1>
                <p class="mt-4 text-lg text-gray-500 dark:text-gray-400 max-w-2xl mx-auto">
                    Explore opportunities to join the <span class="text-leaf font-medium">DREAMRS</span> Lab and work on
                    exciting research projects.
                </p>
            </div>

            <!-- Opening Categories -->
            <div id="openings-container" class="w-full px-4 md:px-8">
                <!-- Loading State -->
                <div id="loading-state" class="text-center py-12">
                    <div class="animate-pulse flex flex-col items-center gap-4">
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/4"></div>
                        <div class="h-32 bg-gray-100 dark:bg-gray-800 rounded-xl w-full max-w-2xl"></div>
                    </div>
                </div>
            </div>

            <!-- Template for Sections (to be used by JS) -->
            <template id="category-template">
                <div class="category-section">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-1 h-8 bg-leaf rounded-full"></div>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-white category-title">Category
                            Name</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 category-grid">
                        <!-- Cards injected here -->
                    </div>
                </div>
            </template>
        </div>
    </section>

    <script src="env.js"></script>
    <script src="script.js"></script>
    <script>
        // Uses window.ENV from env.js
        const API_BASE_URL = window.ENV?.API_BASE_URL || window.API_CONFIG?.API_BASE_URL || '';

        function getFileUrl(filename) {
            if (!filename) return '';
            if (filename.startsWith('http://') || filename.startsWith('https://')) return filename;
            return `${API_BASE_URL}/api/files/download/${encodeURIComponent(filename)}`;
        }

        async function loadOpenings() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/data/openings`);
                const data = await response.json();
                const categories = data.categories || { phd: [], ra: [], btech: [], mtech: [] };

                renderCategories(categories);
            } catch (error) {
                console.error('Error loading openings:', error);
                document.getElementById('loading-state').innerHTML = `<p class="text-red-500">Failed to load openings.</p>`;
            }
        }

        function renderCategories(data) {
            const container = document.getElementById('openings-container');
            container.innerHTML = ''; // Clear loading

            // Table-like Grid Container
            // Uses divide-x to create vertical separators between columns
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 divide-y md:divide-y-0 md:divide-x divide-gray-200 dark:divide-gray-700 border-t border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900';

            const catMap = [
                { id: 'phd', title: 'PhD Positions' },
                { id: 'ra', title: 'Research Assistant' },
                { id: 'btech', title: 'B.Tech Projects' },
                { id: 'mtech', title: 'M.Tech Projects' }
            ];

            catMap.forEach(cat => {
                const items = data[cat.id] || [];

                // Column Container
                const col = document.createElement('div');
                col.className = 'p-6 flex flex-col min-h-[300px] hover:bg-gray-50 dark:hover:bg-gray-800/30 transition-colors';

                // Header (Centered Title)
                let content = `
                    <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-8 text-center uppercase tracking-wide border-b border-gray-100 dark:border-gray-800 pb-4">${cat.title}</h2>
                    <div class="flex-1 w-full">
                `;

                if (items.length > 0) {
                    content += `
                        <table class="w-full text-left border-collapse">
                            <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    `;

                    items.forEach((item, index) => {
                        content += `
                            <tr>
                                <td class="py-3 px-2 text-gray-500 dark:text-gray-400 font-medium align-top w-8">${index + 1}.</td>
                                <td class="py-3 px-2 align-top">
                                    <span class="text-gray-900 dark:text-gray-100 font-medium text-base leading-snug block">${item.title}</span>
                                </td>
                                <td class="py-3 px-2 align-top text-right whitespace-nowrap w-32">
                                    <div class="flex flex-col items-end gap-1">
                                        ${item.file ? `
                                            <a href="${getFileUrl(item.file)}" target="_blank" class="text-leaf hover:text-green-700 font-bold hover:underline inline-flex items-center gap-1 text-sm">
                                                <span>View PDF</span>
                                            </a>
                                        ` : ''}
                                        
                                        ${item.link ? `
                                            <a href="${item.link}" target="_blank" class="text-leaf hover:text-green-700 font-bold hover:underline inline-flex items-center gap-1 text-sm">
                                                <span>Apply</span>
                                            </a>
                                        ` : ''}
                                    </div>
                                </td>
                            </tr>
                        `;
                    });

                    content += `
                            </tbody>
                        </table>
                    `;
                } else {
                    // Empty State
                    content += `
                        <div class="h-full flex flex-col items-center justify-start pt-10 text-gray-400 dark:text-gray-500">
                            <span class="text-sm italic">-- No Current Openings --</span>
                        </div>
                    `;
                }

                content += `</div>`;
                col.innerHTML = content;
                grid.appendChild(col);
            });

            container.appendChild(grid);
        }

        document.addEventListener('DOMContentLoaded', loadOpenings);
    </script>
</body>

</html>
