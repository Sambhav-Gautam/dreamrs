<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources | DREAMRS Lab</title>
    <meta name="description" content="DREAMRS Lab Resources - PPTs, Videos, and educational materials">
    <link rel="icon" href="images/logo.png" type="image/png">
    <link href="./custom.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

    <section id="Resources" class="py-8 pt-36 px-6 bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col">
        <div class="container mx-auto max-w-6xl flex-1 flex flex-col">
            <!-- Section Header -->
            <div class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-800 dark:text-white">
                    <span class="gradient-text">Resources</span>
                </h1>
                <p class="mt-4 text-lg text-gray-500 dark:text-gray-400 max-w-2xl mx-auto">
                    PPTs, Videos, and educational materials from <span class="text-leaf font-medium">DREAMRS</span> Lab
                </p>
            </div>

            <!-- Resources Coming Soon Message -->
            <div class="flex-1 flex items-center justify-center">
                <div class="text-center glass-card rounded-2xl p-12 max-w-lg">
                    <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-leaf/10 flex items-center justify-center">
                        <svg class="w-10 h-10 text-leaf" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-3">Coming Soon</h3>
                    <p class="text-gray-600 dark:text-gray-400">
                        We are gathering resources and will make them available soon.
                        Check back later for PPTs, videos, and other educational materials.
                    </p>
                </div>
            </div>

            <!-- Future Resource Grid (hidden for now, for admin upload) -->
            <div id="resources-container" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Resources will be dynamically injected here -->
            </div>
        </div>
    </section>

    <script src="env.js"></script>
    <script src="script.js"></script>
    <script>
        const API_BASE_URL = window.ENV?.API_BASE_URL || window.API_CONFIG?.API_BASE_URL || '';

        function getFileUrl(filename) {
            if (!filename) return '';
            if (filename.startsWith('http://') || filename.startsWith('https://')) return filename;
            return `${API_BASE_URL}/api/files/download/${encodeURIComponent(filename)}`;
        }

        function getFileTypeInfo(type) {
            const icons = {
                'presentation': { icon: '📊', label: 'Presentation' },
                'video': { icon: '🎥', label: 'Video' },
                'document': { icon: '📄', label: 'Document' },
                'other': { icon: '📁', label: 'File' }
            };
            return icons[type] || icons['other'];
        }

        async function loadResources() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/data/resources`);
                const resources = await response.json();

                if (resources && resources.length > 0) {
                    renderResources(resources);
                }
            } catch (error) {
                console.log('Resources not yet available');
            }
        }

        function renderResources(resources) {
            const container = document.getElementById('resources-container');
            const comingSoonDiv = document.querySelector('.flex-1.flex.items-center.justify-center');

            if (!container || !resources || resources.length === 0) return;

            // Hide coming soon message
            if (comingSoonDiv) comingSoonDiv.style.display = 'none';

            container.classList.remove('hidden');
            container.innerHTML = '';

            resources.forEach(resource => {
                const typeInfo = getFileTypeInfo(resource.type);
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-shadow border border-gray-100 dark:border-gray-700';

                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 rounded-lg bg-leaf/10 flex items-center justify-center text-2xl">
                                ${typeInfo.icon}
                            </div>
                            <span class="text-xs uppercase tracking-wider text-gray-400 font-medium">${typeInfo.label}</span>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">${resource.title || 'Untitled'}</h3>
                        ${resource.description ? `<p class="text-sm text-gray-600 dark:text-gray-400 mb-4">${resource.description}</p>` : '<p class="mb-4"></p>'}
                        ${resource.file ? `
                            <a href="${getFileUrl(resource.file)}" target="_blank" class="inline-flex items-center gap-2 text-leaf hover:underline text-sm font-medium">
                                View ${typeInfo.label}
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                </svg>
                            </a>
                        ` : '<span class="text-sm text-gray-400 italic">No file attached</span>'}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', loadResources);
    </script>
</body>

</html>
